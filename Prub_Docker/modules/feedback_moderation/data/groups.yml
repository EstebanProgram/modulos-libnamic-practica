# Grupo público del módulo feedback.
# Incluye a usuarios sin autenticación y usuarios con acceso básico.
# Sus permisos estarán restringidos mediante reglas ACL con dominio.
- model: core.group
  ext_id: feedback_group_viewer
  fields:
    name: "Feedback - Público / Visualizador"
    parent_id.ext_id: core.core_group_public

# Grupo de moderación del módulo feedback.
# Hereda los permisos del grupo público pero además tendrá
# permisos de gestión completa sobre sugerencias, comentarios y etiquetas.
- model: core.group
  ext_id: feedback_group_moderator
  fields:
    name: "Feedback - Moderador"
    parent_id.ext_id: feedback_group_viewer