# Definición de la estructura de menús para el módulo Community Events

# --- Menú raíz del módulo ---
- model: ui.menuitem
  ext_id: menu_community_events_root
  fields:
    title: "Eventos"
    icon: "mdi-calendar-star"
    sequence: 40
    # Menú principal que agrupa todas las opciones del módulo Community Events

# --- Submenú: Gestión de eventos ---
- model: ui.menuitem
  ext_id: menu_community_events_event
  fields:
    title: "Gestión de Eventos"
    parent_id.ext_id: menu_community_events_root
    action_id.ext_id: action_community_events_event
    sequence: 10
    # Permite acceder a la gestión completa de eventos:
    # alta, edición, revisión y filtrado

# --- Submenú: Sesiones ---
- model: ui.menuitem
  ext_id: menu_community_events_session
  fields:
    title: "Sesiones"
    parent_id.ext_id: menu_community_events_root
    action_id.ext_id: action_community_events_session
    sequence: 20
    # Permite consultar y gestionar las sesiones asociadas a los eventos

# --- Submenú: Inscripciones ---
- model: ui.menuitem
  ext_id: menu_community_events_registration
  fields:
    title: "Inscripciones"
    parent_id.ext_id: menu_community_events_root
    action_id.ext_id: action_community_events_registration
    sequence: 30
    # Permite ver y gestionar las inscripciones de los participantes