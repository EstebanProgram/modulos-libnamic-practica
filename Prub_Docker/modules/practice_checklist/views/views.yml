- model: ui.view
  ext_id: practice_checklist_view_checklist_list
  fields:
    name: "practice_checklist.checklist - List"

    title: "Checklists - List"
    title_i18n_key: "practice_checklist.views.checklist_list"

    model_key: practice_checklist.checklist
    type_id.ext_id: ui.ui_view_type_list

    definition:
      columns:
        - field: id
          label: "ID"
          label_i18n_key: "practice_checklist.checklist.id"
          width: 70

        - field: name
          label: "Name"
          label_i18n_key: "practice_checklist.checklist.name"
          sortable: true

        - field: status
          label: "Status"
          label_i18n_key: "practice_checklist.checklist.status"
          chip: true

        - field: owner_id
          label: "Owner"
          label_i18n_key: "practice_checklist.checklist.owner_id"

        - field: is_public
          label: "Public"
          label_i18n_key: "practice_checklist.checklist.is_public"
          width: 90

        - field: closed_at
          label: "Closed at"
          label_i18n_key: "practice_checklist.checklist.closed_at"

      actions:
        - name: new
          type: create
          icon: mdi-plus
          label: "New"
          label_i18n_key: "practice_checklist.actions.new"

        - name: edit
          type: update
          icon: mdi-pencil
          label: "Edit"
          label_i18n_key: "practice_checklist.actions.edit"

        - name: delete
          type: delete
          icon: mdi-delete
          label: "Delete"
          label_i18n_key: "practice_checklist.actions.delete"

      row_actions:

        - key: close
          type: service
          label: "Close"
          label_i18n_key: "practice_checklist.actions.mark_done"
          icon: mdi-check
          method: close
          model_key: practice_checklist.checklist
          groups:
            [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "Are you sure?"
            text_i18n_key: "practice_checklist.messages.close_confirm"

        - key: reopen
          type: service
          label: "Reopen"
          label_i18n_key: "practice_checklist.actions.mark_pending"
          icon: mdi-lock-open-variant-outline
          method: reopen
          model_key: practice_checklist.checklist
          groups:
            [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "Are you sure?"
            text_i18n_key: "practice_checklist.messages.reopen_confirm"